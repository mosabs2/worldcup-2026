name: StatsAPI daily enrich

# TheStatsAPI Starter tier is ~12 requests/minute, so this is a SEPARATE,
# once-daily job (the 2-hourly auto-update keeps using the free ESPN feed for
# scores). It enriches matches with xG + market lines and rebuilds the props
# race, then recomputes the model (xG-tempered Elo) and republishes.
# Runs at 08:00 UTC (11:00 Kuwait), after the North American match window.

# DISABLED 20 Jun 2026: TheStatsAPI feed was dropped (Starter monthly quota
# exhausted; market odds shown by backtest to be no sharper than the model). The
# daily schedule is removed so this never auto-runs; workflow_dispatch is kept so
# the job can be triggered manually if the feed is ever revived (also restore the
# two StatsAPI steps in auto-update.yml and set STATSAPI_ENABLED=True in health_check.py).
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # Shared with auto-update: both push to this repo, so serialise them to avoid a
  # git push race (they collide at 08:00 UTC). cancel-in-progress: false = queue, not drop.
  group: site-publish
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Enrich matches with xG + market lines
        env:
          STATSAPI_KEY: ${{ secrets.STATSAPI_KEY }}
        run: python3 scripts/fetch_statsapi.py

      # Props race (Golden Boot, assists, cards, team goals). Now incremental and
      # cached (src/props-cache.json), so it harvests only matches not seen before
      # — a few API calls, not the whole-tournament re-harvest that used to hang
      # past the timeout and leave the boards frozen. The 15-min auto-update job
      # also runs this, so by here it is usually a no-op; this is the daily
      # backstop. Time-bounded and non-fatal so a hiccup never blocks the publish.
      - name: Refresh props race (incremental)
        continue-on-error: true
        env:
          STATSAPI_KEY: ${{ secrets.STATSAPI_KEY }}
        run: timeout 720 python3 scripts/fetch_props.py || echo "props harvest failed — skipping; xG + model still publish"

      - name: Recompute model and timeline snapshot
        run: node update.js --date "$(date -u +%F)"

      - name: Rebuild site
        run: python3 build.py

      - name: Commit and publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "statsapi: daily xG/market/props enrich $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi

      # Watchdog (NOT swallowed): fail red if the published data is internally
      # inconsistent, so a silent staleness emails the repo owner instead of hiding.
      - name: Watchdog — data consistency self-check
        run: python3 scripts/health_check.py

      # Push a phone alert (via ntfy) if any step above failed. Topic is a secret;
      # never fails the job itself.
      - name: Alert phone on failure
        if: failure()
        run: |
          curl -s -H "Title: ⚠ World Cup site — daily enrich failed" -H "Priority: high" -H "Tags: warning" \
            -d "The daily StatsAPI enrich failed (watchdog or a step errored). Check: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" || true
