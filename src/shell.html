<!-- OneSignal web-push (match-start + goal alerts). Its worker lives in the
     /worldcup-2026/onesignal/ scope (dashboard-configured) so it never touches
     the scores PWA worker at /worldcup-2026/. Subscription is driven by the
     explicit "Match alerts" button in the app, not an auto-prompt. -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.WC_OS_STATUS = "waiting-for-sdk";   // becomes initializing -> ready, or init-error:<msg>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function (OneSignal) {
  window.WC_OS = OneSignal;
  window.WC_OS_STATUS = "initializing";
  try {
    await OneSignal.init({
      appId: "c86b42d9-2e6b-40b5-8512-0f11c857decf",
      serviceWorkerPath: "worldcup-2026/sw.js",
      serviceWorkerParam: { scope: "/worldcup-2026/" },
      allowLocalhostAsSecureOrigin: true,
    });
    window.WC_OS_STATUS = "ready";
  } catch (e) { window.WC_OS_STATUS = "init-error: " + ((e && e.message) || String(e)); }
});
</script>
<script>
/* Resolve the effective theme before first paint (no flash). Stored mode is auto|light|dark. */
(function(){try{var raw=localStorage.getItem('wc26.theme.v1');var m='auto';if(raw){try{m=JSON.parse(raw);}catch(e){m=raw;}}var dark=m==='dark'||(m==='auto'&&window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=dark?'dark':'light';}catch(e){}})();
</script>

<script>
// Register the service worker for seamless background updates. Network-first
// (see sw.js) keeps the app fresh whenever online; this also auto-reloads once
// when a new worker takes over, and re-checks for updates whenever the app is
// brought back to the foreground (the case that matters for iOS home-screen apps).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').then(function (reg) {
      var updatePending = false, refreshing = false;
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) updatePending = true;
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (updatePending && !refreshing) { refreshing = true; location.reload(); }
      });
      // re-check on foreground (reopened standalone app) and shortly after load
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') reg.update().catch(function () {});
      });
      setTimeout(function () { reg.update().catch(function () {}); }, 3000);
    }).catch(function () {});
  });
}
</script>
