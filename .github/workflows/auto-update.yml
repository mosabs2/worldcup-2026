name: Auto-update scores

# Matches run in North America: kickoffs fall roughly 16:00-03:00 UTC
# (19:00-06:00 Kuwait), with the latest games ending ~06:00 UTC. Inside that
# window the schedule fires every 15 minutes so a full-time result publishes
# within ~15 min of the final whistle. Outside it (the Kuwait daytime, 07:00-
# 15:59 UTC) it fires hourly as a backstop rather than going dark for nine hours:
# GitHub can silently drop scheduled runs, so the old daytime blackout could leave
# the published page frozen on an overnight snapshot all morning. The hourly pass
# also retries the light --only-missing-xg enrich, so xG that lands late still
# fills in during the day. Each run is a quick no-op when nothing has changed, so
# the cadence is cheap (public repo = free Actions).
on:
  schedule:
    - cron: '*/15 16-23 * * *'   # match window: every 15 min
    - cron: '*/15 0-6 * * *'     # match window past midnight UTC: every 15 min
    - cron: '0 7-15 * * *'       # Kuwait daytime backstop: hourly (was a 9h blackout)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch completed scores from the ESPN feed
        id: fetch
        run: python3 scripts/fetch_scores.py

      # Goal events (scorer, minute, pen/OG) from ESPN's free summary feed, the
      # timely source for the match-modal Goals list. continue-on-error so a feed
      # hiccup never blocks the score commit. No-op once all matches are espn-sourced.
      - name: Fetch goal events from ESPN
        if: steps.fetch.outputs.changed == 'true'
        continue-on-error: true
        run: python3 scripts/fetch_goals.py

      # Light, self-healing xG enrich: pulls TheStatsAPI shotmap xG for any completed
      # match that still lacks it (skips the full market sweep and the props harvest).
      # Makes NO API call when nothing is missing, so it is free to run every cycle;
      # when a match is missing xG it retries each 15-min cycle until the shotmap is
      # published, so xG lands within ~15 min of full-time instead of the next morning.
      # continue-on-error so a StatsAPI hiccup never blocks the score commit; the daily
      # statsapi-update workflow remains the full-sweep backstop.
      - name: Enrich newly-completed matches with xG (StatsAPI, light)
        id: xg
        continue-on-error: true
        env:
          STATSAPI_KEY: ${{ secrets.STATSAPI_KEY }}
        run: python3 scripts/fetch_statsapi.py --only-missing-xg

      # Once the group stage finishes, build the knockout bracket and resolve each
      # round's teams from completed results. No-ops while groups are in progress.
      # continue-on-error so a feed hiccup here never blocks the score commit
      # (fetch_scores has already patched the scores into data.js by this point).
      - name: Build/resolve knockout bracket
        if: steps.fetch.outputs.changed == 'true'
        continue-on-error: true
        run: python3 scripts/generate_knockout.py --from-feed

      - name: Recompute model and timeline snapshot
        if: steps.fetch.outputs.changed == 'true' || steps.xg.outputs.changed == 'true'
        run: node update.js --date "$(date -u +%F)"

      - name: Rebuild site
        if: steps.fetch.outputs.changed == 'true' || steps.xg.outputs.changed == 'true'
        run: python3 build.py

      - name: Commit and publish
        if: steps.fetch.outputs.changed == 'true' || steps.xg.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto-update: scores synced from ESPN feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
