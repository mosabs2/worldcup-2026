<style>
/* MAS brand: Pantone Reflex Blue #0E1E91, Cool Gray #5A5A5A, Inter.
   Gradient: linear-gradient(135deg, #1C62B7 0%, #0E1E91 50%, #162E68 100%) */
:root {
  --blue: #0E1E91;
  --blue-light: #1C62B7;
  --blue-dark: #162E68;
  --gray: #5A5A5A;
  --gray-light: #9A9A9A;
  --line: #E4E7F0;
  --bg: #FAFBFD;
  --card: #FFFFFF;
  --ink: #1A1F36;
  --green: #1A7F4E;
  --red: #B3261E;
  --amber: #9A6B00;
  --grad: linear-gradient(135deg, #1C62B7 0%, #0E1E91 50%, #162E68 100%);
}
/* Dark mode. The head script sets data-theme to the effective theme (auto follows the
   system setting; the header toggle overrides), so every dark rule keys off a single
   selector with no duplication. The navy --grad masthead stays brand in both modes. */
:root[data-theme="dark"] {
  color-scheme: dark;
  --blue: #7d9bff;
  --gray: #9aa3b8;
  --gray-light: #6b7488;
  --line: #2a3148;
  --bg: #0d1117;
  --card: #161c2c;
  --ink: #e6e9f2;
  --green: #43d17f;
  --red: #ff8a80;
  --amber: #f2c14e;
}
:root[data-theme="dark"] .tag.ft { background: #13321f; color: #5fd58a; }
:root[data-theme="dark"] .tag.live { background: #3a1714; color: #ff9a90; }
:root[data-theme="dark"] .tag.up { background: #16204a; color: #9db4ff; }
:root[data-theme="dark"] .tag.whatif { background: #3a3112; color: #f2d680; }
:root[data-theme="dark"] .pbar .pd { background: #3a4470; }
:root[data-theme="dark"] .modal { background: var(--card); }
:root[data-theme="dark"] td.pick-hit { background: #173a23; }
:root[data-theme="dark"] td.pick-miss { background: #3a1714; }
:root[data-theme="dark"] .compare-table td.lone { background: #3a3112; box-shadow: inset 0 0 0 1px #6a5a1e; }
:root[data-theme="dark"] input, :root[data-theme="dark"] select, :root[data-theme="dark"] textarea { background: #0f1422; color: var(--ink); }
:root[data-theme="dark"] button.btn.ghost { background: transparent; }
:root[data-theme="dark"] tr.click:hover td { background: #1c2333; }
:root[data-theme="dark"] .mena-chip { background: var(--card); }
:root[data-theme="dark"] .geomap { background: linear-gradient(180deg, #0f1626 0%, #0b1019 100%); }
:root[data-theme="dark"] .geomap .land { fill: #222b42; stroke: #33405f; }
:root[data-theme="dark"] .banner { background: #2a2410; border-color: #4a3f1e; color: #f2d680; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.5;
}
a { color: var(--blue); text-decoration: none; }

/* Header */
header {
  background: var(--grad); color: #fff; padding: 18px 20px 0;
  position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 12px rgba(14,30,145,.25);
}
.masthead { display: flex; align-items: center; gap: 14px; max-width: 1200px; margin: 0 auto; }
.masthead .mono { width: 34px; height: 44px; flex: none; }
.masthead .lockup-divider { width: 1px; height: 36px; background: rgba(255,255,255,.35); flex: none; }
.masthead .ball { width: 30px; height: 30px; flex: none; opacity: .95; }
.masthead h1 { font-size: 19px; font-weight: 700; letter-spacing: .01em; }
.masthead .sub { font-size: 11.5px; opacity: .82; font-weight: 400; letter-spacing: .14em; text-transform: uppercase; }
.masthead .spacer { flex: 1; }
.asof { font-size: 11px; opacity: .85; text-align: right; line-height: 1.4; }
.whatif-pill {
  background: #FFD34D; color: #4A3A00; font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 99px; cursor: pointer; border: none; letter-spacing: .04em;
}
.whatif-pill.off { background: rgba(255,255,255,.18); color: #fff; font-weight: 500; }
nav { max-width: 1200px; margin: 12px auto 0; display: flex; gap: 2px; overflow-x: auto; }
nav button {
  background: none; border: none; color: rgba(255,255,255,.75); font: inherit; font-size: 13px;
  font-weight: 500; padding: 9px 13px; cursor: pointer; border-bottom: 3px solid transparent;
  white-space: nowrap;
}
nav button.active { color: #fff; border-bottom-color: #fff; font-weight: 600; }
nav button:hover { color: #fff; }

main { max-width: 1200px; margin: 0 auto; padding: 22px 20px 60px; }
.banner {
  background: #FFF6D9; border: 1px solid #E8D48A; color: #4A3A00; border-radius: 10px;
  padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: flex; gap: 10px; align-items: center;
}
.banner button { margin-left: auto; }

/* Cards and grids */
.grid { display: grid; gap: 14px; }
.g2 { grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); }
.g3 { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
.g4 { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); }
.card {
  background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px;
  box-shadow: 0 1px 3px rgba(22,46,104,.05);
}
.card h3 {
  font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--blue);
  font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.card h3 .right { margin-left: auto; font-weight: 500; color: var(--gray-light); letter-spacing: 0; text-transform: none; }
h2.section {
  font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--blue);
  font-weight: 700; margin: 26px 0 12px;
}
h2.section:first-child { margin-top: 0; }
.muted { color: var(--gray); font-size: 12.5px; }
.tiny { color: var(--gray-light); font-size: 11px; }

/* Match cards */
.match { display: flex; flex-direction: column; gap: 8px; }
.match .row { display: flex; align-items: center; gap: 10px; }
.match .team { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; font-weight: 600; font-size: 14.5px; }
.match .team .fl { font-size: 20px; }
.match .team.away { justify-content: flex-end; text-align: right; }
.match .score { font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; padding: 0 6px; }
.match .vs { color: var(--gray-light); font-size: 12px; padding: 0 6px; }
.match .xg-line { text-align: center; font-size: 12px; font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; letter-spacing: .02em; margin: 4px 0 2px; }
.match .xg-line .lab { color: var(--gray-light); font-weight: 700; letter-spacing: .08em; font-size: 10px; }
.xg-block .frow { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
.xg-block .frow .fl-label { min-width: 150px; color: var(--ink); font-weight: 600; }
.xg-block .frow .hbar { flex: 1; height: 12px; }
.xg-block .frow .num { min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
.match .meta { font-size: 11.5px; color: var(--gray); display: flex; gap: 10px; flex-wrap: wrap; }
.tag { font-size: 10px; font-weight: 700; letter-spacing: .08em; padding: 2px 7px; border-radius: 99px; text-transform: uppercase; }
.tag.ft { background: #E8F0E9; color: var(--green); }
.tag.live { background: #FDE9E7; color: var(--red); }
.tag.up { background: #EAEDFB; color: var(--blue); }
.tag.whatif { background: #FFF1BF; color: #6B5200; }

/* Probability bars */
.pbar { display: flex; height: 9px; border-radius: 99px; overflow: hidden; background: var(--line); }
.pbar .p1 { background: var(--blue); }
.pbar .pd { background: #C3CBE8; }
.pbar .p2 { background: var(--blue-light); opacity: .55; }
.plabels { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray); margin-top: 3px; font-variant-numeric: tabular-nums; }
.hbar { height: 8px; border-radius: 99px; background: var(--line); overflow: hidden; }
.hbar > div { height: 100%; background: var(--grad); border-radius: 99px; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
th { text-align: left; font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--gray-light); font-weight: 600; padding: 6px 8px; border-bottom: 1px solid var(--line); }
td { padding: 7px 8px; border-bottom: 1px solid #F0F2F8; }
tr:last-child td { border-bottom: none; }
th.num, td.num { text-align: right; }
tr.click { cursor: pointer; }
tr.click:hover td { background: #F5F7FD; }
tr.qual td:first-child { box-shadow: inset 3px 0 0 var(--blue); }
tr.third td:first-child { box-shadow: inset 3px 0 0 #9BB0E8; }
.teamcell { display: flex; align-items: center; gap: 7px; font-weight: 600; white-space: nowrap; min-width: 0; }
.teamcell .nm { overflow: hidden; text-overflow: ellipsis; }
/* the team column absorbs spare width and truncates; numeric columns always fit */
td:has(> .teamcell) { max-width: 0; width: 100%; overflow: hidden; }
td.num, th.num { white-space: nowrap; }
th.sortable { cursor: pointer; }
th.sortable:hover { color: var(--blue); }
th.sorted { color: var(--blue); }

/* Bracket */
.bracket { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 12px; }
.bracket .round { min-width: 215px; display: flex; flex-direction: column; gap: 10px; }
.bracket .round h4 { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--blue); margin-bottom: 2px; }
.bk { background: var(--card); border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; font-size: 13px; }
.bk .t { display: flex; align-items: center; gap: 7px; padding: 2.5px 0; }
.bk .t .pct { margin-left: auto; color: var(--gray); font-size: 11.5px; font-variant-numeric: tabular-nums; }
.bk .t.w { font-weight: 700; }
.bk .lbl { font-size: 10px; color: var(--gray-light); margin-bottom: 3px; }

/* Funnel (team modal) */
.funnel { display: flex; flex-direction: column; gap: 7px; }
.funnel .frow { display: grid; grid-template-columns: 110px 1fr 64px; align-items: center; gap: 10px; font-size: 12.5px; }
.funnel .frow .fl-label { color: var(--gray); }
.funnel .frow .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(22,31,54,.45); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
.modal { background: #fff; border-radius: 14px; max-width: 660px; width: 100%; padding: 22px; position: relative; box-shadow: 0 18px 50px rgba(22,46,104,.3); }
.modal .close { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 22px; color: var(--gray-light); cursor: pointer; }
.modal h2 { font-size: 17px; margin-bottom: 4px; display: flex; align-items: center; gap: 9px; }

/* Forms */
input, select, textarea, button.btn {
  font: inherit; font-size: 13.5px; border: 1px solid var(--line); border-radius: 8px;
  padding: 8px 10px; background: #fff; color: var(--ink);
}
textarea { width: 100%; min-height: 84px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
button.btn { background: var(--blue); color: #fff; border: none; font-weight: 600; cursor: pointer; padding: 9px 16px; }
button.btn:hover { background: var(--blue-dark); }
button.btn.ghost { background: #fff; color: var(--blue); border: 1px solid var(--blue); }
button.btn.small { padding: 5px 11px; font-size: 12px; }
.formrow { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
.picks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
.picks-grid label { font-size: 11px; color: var(--gray); display: block; margin-bottom: 2px; }
code.codebox {
  display: block; background: #F4F6FB; border: 1px solid var(--line); border-radius: 8px;
  padding: 10px; font-size: 11px; word-break: break-all; font-family: ui-monospace, Menlo, monospace;
}

/* Timeline chart */
.chart-wrap { overflow-x: auto; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; margin-top: 10px; }
.legend span { display: flex; align-items: center; gap: 5px; }
.legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

/* Venue map */
.vmap { width: 100%; height: auto; background: #F2F5FB; border-radius: 10px; border: 1px solid var(--line); }
.vmap circle { fill: var(--blue); }
.vmap text { font-size: 9px; fill: var(--gray); font-family: Inter, sans-serif; }
.geomap { width: 100%; height: auto; background: linear-gradient(180deg, #F7F9FE 0%, #EDF1FA 100%); border-radius: 12px; border: 1px solid var(--line); }
.geomap .land { fill: #E3E9F7; stroke: #B9C5E6; stroke-width: 1; vector-effect: non-scaling-stroke; }
.geomap .venue { fill: var(--blue); stroke: #fff; stroke-width: 1.5; cursor: pointer; vector-effect: non-scaling-stroke; }
.geomap .venue:hover { fill: var(--blue-light); }
.geomap .vlabel { font-size: 10px; fill: var(--ink); font-family: Inter, sans-serif; font-weight: 600; paint-order: stroke; stroke: rgba(255,255,255,.85); stroke-width: 3px; pointer-events: none; }
.geomap .today-ring { fill: none; stroke: var(--blue); stroke-width: 2; vector-effect: non-scaling-stroke; animation: vpulse 1.8s ease-out infinite; transform-box: fill-box; transform-origin: center; }
@keyframes vpulse { 0% { transform: scale(.6); opacity: .9; } 100% { transform: scale(2.2); opacity: 0; } }

/* MENA */
.mena-strip { display: flex; gap: 8px; flex-wrap: wrap; }
.mena-chip { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--line); border-radius: 99px; padding: 5px 12px 5px 8px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
.mena-chip .pct { color: var(--gray); font-weight: 500; font-size: 11.5px; }

/* Footer */
footer { border-top: 1px solid var(--line); margin-top: 40px; padding: 18px 20px 30px; }
footer .inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 14px; align-items: center; color: var(--gray); font-size: 12px; flex-wrap: wrap; }
footer .mono-foot { width: 16px; height: 21px; opacity: .8; }

.spin { text-align: center; color: var(--gray); padding: 40px 0; font-size: 13px; }

td.pick-hit { background: #E8F0E9; }
td.pick-miss { background: #FDE9E7; }
tr.exhibition-row td { background: #FBF6E3; }
tr.exhibition-row td:first-child { box-shadow: inset 3px 0 0 #C7A234; color: #9A6B00; }
.exh-badge { display: inline-block; margin-left: 7px; font-size: 9px; font-weight: 700; letter-spacing: .08em; color: #9A6B00; background: #F3E6BC; padding: 1px 6px; border-radius: 99px; vertical-align: middle; }
.selections th.exh-col { color: #9A6B00; background: #FBF6E3; }
.selections th { white-space: nowrap; }
.selections td { white-space: nowrap; }

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--blue-dark); color: #fff; font-size: 13px; padding: 10px 18px;
  border-radius: 99px; box-shadow: 0 6px 24px rgba(22,46,104,.35); z-index: 200;
  opacity: 0; transition: opacity .25s; max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; }

@media (max-width: 640px) {
  .masthead h1 { font-size: 15px; }
  .masthead .sub { display: none; }
  .masthead .lockup-divider { display: none; }
  main { padding: 16px 12px 50px; }
  nav button { padding: 9px 10px; font-size: 12.5px; }
  .card { overflow-x: auto; }   /* wide tables scroll inside their card instead of clipping */
  table { font-size: 12px; }
  .g2, .g3 { grid-template-columns: 1fr; }
}

/* Print: clean MAS-brand snapshot of the active view */
@media print {
  header { position: static; box-shadow: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  nav, .whatif-pill, .banner button, button.btn, .no-print { display: none !important; }
  body { background: #fff; font-size: 12px; }
  .card { box-shadow: none; break-inside: avoid; }
  main { max-width: none; padding: 14px 0; }
  .pbar, .hbar, .tag, .bk { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* Compare picks tab */
.subh { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--gray-light); font-weight: 700; margin-bottom: 6px; }
.cell-team { display: inline-flex; align-items: center; gap: 5px; }
.cell-team .fl { font-size: 15px; }
.champ-split .row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #F0F2F8; }
.champ-split .row:last-child { border-bottom: none; }
.champ-split .ct { font-weight: 700; color: var(--blue); min-width: 24px; text-align: right; flex: none; }
.champ-split .bar { height: 8px; background: var(--blue); border-radius: 99px; flex: none; }
.champ-split .who { color: var(--gray); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.lone-badge { color: #6B5200; font-weight: 700; }
.compare-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.compare-table { min-width: 760px; font-size: 12px; }
.compare-table th, .compare-table td { white-space: nowrap; padding: 6px 7px; }
.compare-table td.nm-cell, .compare-table th.nm-cell { position: sticky; left: 0; background: var(--card); font-weight: 600; box-shadow: 1px 0 0 var(--line); z-index: 1; }
.compare-table tr.exhibition-row td.nm-cell { background: #FBF6E3; }
.compare-table td.lone { background: #FFF1BF; box-shadow: inset 0 0 0 1px #E0C04A; }

    return { ratings: r, delta };

  function hostEdge(code, venueId, venueCountry) {
    if (!HOSTS[code] || !venueId) return 0;
    const c = venueCountry[venueId] || '';
    const map = { MEX: 'Mexico', USA: 'United States', CAN: 'Canada' };
    return c === map[code] ? HOST_BONUS : 0;
  }

  // --- Single-match model ---
  function predict(ra, rb) {
    const diff = ra - rb;
    const pAwin = 1 / (1 + Math.pow(10, -diff / LOGISTIC_DIV));
    const draw = Math.max(0.17, Math.min(0.30, 0.27 - Math.abs(diff) / 2600));
    const p1 = (1 - draw) * pAwin, p2 = (1 - draw) * (1 - pAwin);
    const xg1 = clamp(1.22 + diff / 780, 0.35, 2.65);
    const xg2 = clamp(1.22 - diff / 780, 0.35, 2.65);
    return { p1, draw, p2, xg1, xg2 };
  }
  function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

  function poissonPmf(k, lambda) {
    let f = 1; for (let i = 2; i <= k; i++) f *= i;
    return Math.pow(lambda, k) * Math.exp(-lambda) / f;
  }
  function topScorelines(xg1, xg2, n) {
    const out = [];
    for (let a = 0; a <= 5; a++) for (let b = 0; b <= 5; b++)
      out.push({ s: a + '-' + b, a, b, p: poissonPmf(a, xg1) * poissonPmf(b, xg2) });
    out.sort((x, y) => y.p - x.p);
    return out.slice(0, n || 5);
  }
  function sampleGoals(lambda, rng) {
    const L = Math.exp(-lambda); let k = 0, p = 1;
    do { k++; p *= rng(); } while (p > L);
    return k - 1;
  }

  // --- Full tournament Monte Carlo ---
  // overrides: {matchId: {team1: g, team2: g}} hypothetical/actual results (what-if mode).
  // koActuals: completed knockout matches [{round, team1, team2, winner}] pin the bracket.
  function simulateTournament(data, opts) {
    const o = opts || {};
    const N = o.runs || 10000;
    const rng = rngFactory(o.seed != null ? o.seed : 20260612);
    const overrides = o.overrides || {};
    const koActuals = indexKoActuals(o.koActuals || []);
    // completed knockout matches in the data pin the bracket in every run
    for (const m of data.matches) {
      if (m.stage === 'group' || m.status !== 'completed' || !m.score) continue;
      const w = m.score.winner ||
        (m.score.team1 > m.score.team2 ? m.team1 : m.score.team2 > m.score.team1 ? m.team2 : null);
      if (w) koActuals[pairKey(m.team1, m.team2)] = w;
    }
    const venueCountry = {};
    data.venues.forEach(v => { venueCountry[v.id] = v.country; });
    const { ratings } = liveRatings(data, o.extraResults);
    if (o.shocks) for (const c in o.shocks) ratings[c] = (ratings[c] || 1500) + o.shocks[c];

    const codes = data.teams.map(t => t.code);
    const groupOf = {}; data.teams.forEach(t => { groupOf[t.code] = t.group; });
    const groups = {};
    data.teams.forEach(t => { (groups[t.group] = groups[t.group] || []).push(t.code); });
    const groupNames = Object.keys(groups).sort();

    // Knockout venues for the host edge. R32 is per-slot (data-backed); R16+ use
    // each round's representative venue from koSchedule (the data's granularity for
    // those rounds — enough to capture the US-hosted Quarter-finals/Semis/Final).
    const r32SlotVenue = data.r32Template.map(s => s.venueId);
    const koRoundVenue = {};
    (data.koSchedule || []).forEach(k => { if (k.round && !koRoundVenue[k.round]) koRoundVenue[k.round] = k.venueId; });
    const playedRoundVenue = [null, koRoundVenue['Round of 16'], koRoundVenue['Quarter-finals'], koRoundVenue['Semi-finals'], koRoundVenue['Final']];
    // Third-place R32 slots and their allowed-group lists, for a legal assignment.
    const thirdSlots = [];
    data.r32Template.forEach((slot, i) => {
      const side = slot.a.type === 'third' ? slot.a : slot.b.type === 'third' ? slot.b : null;
      if (side) thirdSlots.push({ i, groups: side.groups || null });
    });

    // Pre-split matches: fixed (completed or overridden) vs to-sample
    const fixed = [], open = [];
    for (const m of data.matches) {
      if (m.stage !== 'group') continue;
      const ov = overrides[m.id];
      if (ov) fixed.push({ m, g1: ov.team1, g2: ov.team2 });
      else if (m.status === 'completed' && m.score) fixed.push({ m, g1: m.score.team1, g2: m.score.team2 });
      else open.push(m);
    }
    // Pre-compute lambdas for open matches once (ratings fixed across sims)
    const openPre = open.map(m => {
      const ra = ratings[m.team1] + hostEdge(m.team1, m.venueId, venueCountry);
      const rb = ratings[m.team2] + hostEdge(m.team2, m.venueId, venueCountry);
      const p = predict(ra, rb);
      return { m, xg1: p.xg1, xg2: p.xg2 };
    });

    const tally = {}; // per team: stage reach counts
    codes.forEach(c => { tally[c] = { r32: 0, r16: 0, qf: 0, sf: 0, fin: 0, champ: 0, pts: 0, win: 0, top2: 0, third: 0 }; });

    for (let run = 0; run < N; run++) {
      // group stage
      const st = {};
      codes.forEach(c => { st[c] = { pts: 0, gd: 0, gf: 0 }; });
      const apply = (t1, t2, g1, g2) => {
        st[t1].gf += g1; st[t1].gd += g1 - g2;
        st[t2].gf += g2; st[t2].gd += g2 - g1;
        if (g1 > g2) st[t1].pts += 3; else if (g2 > g1) st[t2].pts += 3;
        else { st[t1].pts++; st[t2].pts++; }
      };
      for (const f of fixed) apply(f.m.team1, f.m.team2, f.g1, f.g2);
      for (const p of openPre) apply(p.m.team1, p.m.team2, sampleGoals(p.xg1, rng), sampleGoals(p.xg2, rng));

      const rank = {};   // group -> ordered codes
      const thirds = [];
      for (const g of groupNames) {
        const order = groups[g].slice().sort((a, b) =>
          st[b].pts - st[a].pts || st[b].gd - st[a].gd || st[b].gf - st[a].gf || rng() - 0.5);
        rank[g] = order;
        tally[order[0]].win++; tally[order[0]].top2++; tally[order[1]].top2++;
        thirds.push(order[2]);
        groups[g].forEach(c => { tally[c].pts += st[c].pts; });
      }
      thirds.sort((a, b) =>
        st[b].pts - st[a].pts || st[b].gd - st[a].gd || st[b].gf - st[a].gf || rng() - 0.5);
      const qualThirds = thirds.slice(0, 8);
      qualThirds.forEach(c => tally[c].third++);

      // R32 from template. Third-place qualifiers are assigned to their slots by a
      // constraint-respecting bijection honouring every slot's allowed-groups list
      // (FIFA guarantees a legal assignment exists); the old greedy first-fit is a
      // fallback only if no legal assignment can be found for the qualifying set.
      const assigned = assignThirds(thirdSlots.map(s => s.groups), qualThirds, c => groupOf[c]);
      const thirdAt = {};
      if (assigned) thirdSlots.forEach((s, k) => { thirdAt[s.i] = assigned[k]; });
      const pool = qualThirds.slice();
      const r32 = data.r32Template.map((slot, i) => {
        const resolve = sd => sd.type === 'group'
          ? rank[sd.group][sd.place - 1]
          : (assigned ? thirdAt[i] : takeThird(pool, rank, slot, rng));
        return [resolve(slot.a), resolve(slot.b)];
      });
      r32.flat().forEach(c => tally[c].r32++);

      // knockout rounds: winners of each round are re-paired sequentially.
      // 16 pairs -> winners reach R16 -> ... -> 2 -> finalists -> 1 -> champion.
      let pairs = r32;
      const stages = ['r16', 'qf', 'sf', 'fin', 'champ'];
      let si = 0;
      while (pairs.length >= 1) {
        const winners = pairs.map((p, j) => {
          const venueId = si === 0 ? r32SlotVenue[j] : playedRoundVenue[si];
          return koWin(p[0], p[1], ratings, rng, koActuals, venueId, venueCountry);
        });
        const stage = stages[si++];
        winners.forEach(c => tally[c][stage]++);
        if (stage === 'champ') break;
        pairs = [];
        for (let i = 0; i < winners.length; i += 2) pairs.push([winners[i], winners[i + 1]]);
      }
    }

    // assemble results
    const teams = {};
    for (const c of codes) {
      const t = tally[c];
      teams[c] = {
        champ: t.champ / N, fin: t.fin / N, sf: t.sf / N, qf: t.qf / N,
        r16: t.r16 / N, r32: t.r32 / N,
        groupWin: t.win / N, top2: t.top2 / N, thirdQual: t.third / N,
        xPts: t.pts / N,
        band: 1.96 * Math.sqrt(Math.max(t.champ / N * (1 - t.champ / N), 1e-9) / N),
      };
    }
    return { teams, runs: N, ratings };
  }

  function takeThird(pool, rank, slot, rng) {
    // honour the slot's allowed-groups list where possible, and avoid same-group pairings
    const side = slot.a.type === 'third' ? slot.a : slot.b;
    const grpOf = c => Object.keys(rank).find(g => rank[g].includes(c));
    const opp = slot.a.type === 'group' ? rank[slot.a.group][slot.a.place - 1] : null;
    const oppGroup = opp ? grpOf(opp) : null;
    let idx = pool.findIndex(c => (!side.groups || side.groups.indexOf(grpOf(c)) !== -1) && grpOf(c) !== oppGroup);
    if (idx === -1) idx = pool.findIndex(c => grpOf(c) !== oppGroup);
    if (idx === -1) idx = 0;
    return pool.splice(idx, 1)[0];
  }

  // Constraint-respecting assignment of the qualifying thirds to the third-place
  // R32 slots: a bijection where each slot's third comes from its allowed-groups
  // list. Backtracking; returns an array aligned to slotGroups, or null if none.
  function assignThirds(slotGroups, thirds, grpOf) {
    const n = slotGroups.length;
    if (thirds.length < n) return null;
    const assign = new Array(n).fill(null), used = new Set();
    const bt = i => {
      if (i === n) return true;
      const allowed = slotGroups[i];
      for (const t of thirds) {
        if (used.has(t)) continue;
        if (allowed && allowed.indexOf(grpOf(t)) === -1) continue;
        assign[i] = t; used.add(t);
        if (bt(i + 1)) return true;
        used.delete(t); assign[i] = null;
      }
      return false;
    };
    return bt(0) ? assign : null;
  }

  // --- bracket-half feasibility for league entries ---
  // Which halves of the official bracket (0 = top, feeds SF1; 1 = bottom, feeds SF2)
  // a team can occupy, given the entry's own twelve group-winner picks.
  function entryHalves(code, entry, data) {
    const team = data.teams.find(t => t.code === code);
    if (!team) return [];
    const g = team.group;
    const pickedWinner = entry.w && entry.w[g] === code;
    const halves = new Set();
    data.r32Template.forEach((slot, i) => {
      const half = i < 8 ? 0 : 1;
      [slot.a, slot.b].forEach(sd => {
        if (sd.type === 'group' && sd.group === g) {
          if (sd.place === 1 && pickedWinner) halves.add(half);
          if (sd.place === 2 && !pickedWinner) halves.add(half);
        } else if (sd.type === 'third' && !pickedWinner) {
          if (!sd.groups || sd.groups.indexOf(g) !== -1) halves.add(half);
        }
      });
    });
    return Array.from(halves);
  }

  // Can this entry's two finalists actually meet in the final?
  function finalFeasible(entry, data) {
    const f = entry.f || [];
    if (f.length !== 2 || f[0] === f[1]) return { ok: false, h1: [], h2: [] };
    const h1 = entryHalves(f[0], entry, data);
    const h2 = entryHalves(f[1], entry, data);
    const ok = h1.some(a => h2.some(b => a !== b));
    return { ok, h1, h2 };
  }

  function indexKoActuals(list) {
    const map = {};
    for (const a of list) map[pairKey(a.team1, a.team2)] = a.winner;
    return map;
  }
  function pairKey(a, b) { return a < b ? a + '|' + b : b + '|' + a; }

  function koWin(a, b, ratings, rng, koActuals, venueId, venueCountry) {
    const pinned = koActuals[pairKey(a, b)];
    if (pinned) return pinned;
    // host edge applies in knockouts too (e.g. a host nation playing at home)
    const ra = ratings[a] + hostEdge(a, venueId, venueCountry);
    const rb = ratings[b] + hostEdge(b, venueId, venueCountry);
    const p = predict(ra, rb);
    let g1 = sampleGoals(p.xg1, rng), g2 = sampleGoals(p.xg2, rng);
    if (g1 !== g2) return g1 > g2 ? a : b;
    g1 = sampleGoals(p.xg1 * ET_LAMBDA_SCALE, rng); g2 = sampleGoals(p.xg2 * ET_LAMBDA_SCALE, rng);
    if (g1 !== g2) return g1 > g2 ? a : b;
    // penalties: slight tilt to the stronger side (host edge included)
    const tilt = clamp(0.5 + (ra - rb) / 4000, 0.35, 0.65);
    return rng() < tilt ? a : b;
  }

  // --- Current group tables from actual results ---
  function currentTables(data, overrides) {
    const st = {};
    data.teams.forEach(t => { st[t.code] = { P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, Pts: 0 }; });
    for (const m of data.matches) {
      if (m.stage !== 'group') continue;
      const ov = overrides && overrides[m.id];
      const sc = ov || (m.status === 'completed' ? m.score : null);
      if (!sc) continue;
      const a = st[m.team1], b = st[m.team2];
      a.P++; b.P++; a.GF += sc.team1; a.GA += sc.team2; b.GF += sc.team2; b.GA += sc.team1;
      if (sc.team1 > sc.team2) { a.W++; b.L++; a.Pts += 3; }
      else if (sc.team2 > sc.team1) { b.W++; a.L++; b.Pts += 3; }
      else { a.D++; b.D++; a.Pts++; b.Pts++; }
    }
    const groups = {};
    data.teams.forEach(t => { (groups[t.group] = groups[t.group] || []).push(t.code); });
    const out = {};
    for (const g in groups) {
      out[g] = groups[g].slice().sort((x, y) =>
        st[y].Pts - st[x].Pts || (st[y].GF - st[y].GA) - (st[x].GF - st[x].GA) || st[y].GF - st[x].GF)
        .map(c => ({ team: c, ...st[c], GD: st[c].GF - st[c].GA }));
    }
    return out;
  }

  // --- Predictions-league scoring ---
  // entry: {n: name, w: {A:'MEX',...}, f: ['ESP','ARG'], c: 'ESP'}
  function scoreEntry(entry, resolved, scoring) {
    let pts = 0; const detail = [];
    for (const g in (entry.w || {})) {
      if (resolved.groupWinners[g]) {
        const hit = resolved.groupWinners[g] === entry.w[g];
        if (hit) pts += scoring.groupWinner;
        detail.push({ what: 'Group ' + g, pick: entry.w[g], actual: resolved.groupWinners[g], pts: hit ? scoring.groupWinner : 0 });
      }
    }
    if (resolved.finalists) {
      for (const f of (entry.f || [])) {
        const hit = resolved.finalists.includes(f);
        if (hit) pts += scoring.finalist;
        detail.push({ what: 'Finalist', pick: f, actual: resolved.finalists.join('/'), pts: hit ? scoring.finalist : 0 });
      }
    }
    if (resolved.champion) {
      const hit = resolved.champion === entry.c;
      if (hit) pts += scoring.champion;
      detail.push({ what: 'Champion', pick: entry.c, actual: resolved.champion, pts: hit ? scoring.champion : 0 });
    }
    return { pts, detail };
  }

  // which group winners are mathematically resolved (all 6 matches played)
  function resolvedOutcomes(data, overrides) {
    const tables = currentTables(data, overrides);
    const played = {};
    for (const m of data.matches) {
      if (m.stage !== 'group') continue;
      const done = (overrides && overrides[m.id]) || (m.status === 'completed' && m.score);
      played[m.group] = (played[m.group] || 0) + (done ? 1 : 0);
    }
    const groupWinners = {};
    for (const g in tables) if (played[g] === 6) groupWinners[g] = tables[g][0].team;
    // finalists and champion resolve from completed knockout rounds
    const winOf = m => m.score.winner ||
      (m.score.team1 > m.score.team2 ? m.team1 : m.score.team2 > m.score.team1 ? m.team2 : null);
    const done = data.matches.filter(m => m.stage !== 'group' && m.status === 'completed' && m.score);
    let finalists = null, champion = null;
    const fin = done.find(m => m.round === 'final');
    if (fin) { finalists = [fin.team1, fin.team2]; champion = winOf(fin); }
    else {
      const sfs = done.filter(m => m.round === 'sf');
      if (sfs.length === 2) finalists = sfs.map(winOf).filter(Boolean);
    }
    return { groupWinners, finalists, champion };
  }

  return {
    rngFactory, liveRatings, predict, topScorelines, poissonPmf, sampleGoals,
    simulateTournament, currentTables, scoreEntry, resolvedOutcomes, hostEdge,
    entryHalves, finalFeasible,
    LOGISTIC_DIV, ELO_K, HOST_BONUS, XG_TEMPER,
  };
});

<script>
// UI layer. Reads WC_DATA + WC_HISTORY (baked) and ENGINE (model).
(function () {
  const D = WC_DATA, E = ENGINE, H = (typeof WC_HISTORY !== 'undefined' ? WC_HISTORY : []);
  const T = {}; D.teams.forEach(t => T[t.code] = t);
  const V = {}; D.venues.forEach(v => V[v.id] = v);
  const VC = {}; D.venues.forEach(v => VC[v.id] = v.country);
  const KWT = 'Asia/Kuwait';
  const localTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const GROUPS = [...new Set(D.teams.map(t => t.group))].sort();
  const PALETTE = ['#0E1E91', '#1C62B7', '#B3261E', '#1A7F4E', '#9A6B00', '#7B2D8E', '#0E7490', '#C2410C', '#5A5A5A', '#BE185D'];

  // ---------- state ----------
  const LS = { ov: 'wc26.overrides.v1', league: 'wc26.league.v1', tab: 'wc26.tab.v1', theme: 'wc26.theme.v1' };
  let localOv = lsGet(LS.ov, {});
  let whatIf = { on: false, ov: {} };
  let leagueLocal = lsGet(LS.league, []);
  let SIM = null, RT = null, TABLES = null;
  let activeTab = lsGet(LS.tab, 'today');
  let teamSort = { key: 'champ', dir: -1 };

  function lsGet(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch (e) { return fb; } }
  function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

  function activeOv() { return whatIf.on ? Object.assign({}, localOv, whatIf.ov) : localOv; }
  function effData() {
    const ov = activeOv();
    if (!Object.keys(ov).length) return D;
    return Object.assign({}, D, {
      matches: D.matches.map(m => ov[m.id]

        : m),
    });
  }

  // drop local overrides once the published data carries the same match as completed
  (function pruneOverrides() {
    let changed = false;
    for (const id in localOv) {
      const m = D.matches.find(x => x.id === id);
      if (m && m.status === 'completed') { delete localOv[id]; changed = true; }
    }
    if (changed) lsSet(LS.ov, localOv);
  })();

  function recompute() {
    const data = effData();
    SIM = E.simulateTournament(data, { runs: 10000 });
    RT = E.liveRatings(data);
    TABLES = E.currentTables(data);
  }

  // ---------- helpers ----------
  function el(tag, attrs, ...kids) {
    const n = document.createElement(tag);
    if (attrs) for (const k in attrs) {
      if (k === 'class') n.className = attrs[k];
      else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
      else if (k === 'html') n.innerHTML = attrs[k];
      else n.setAttribute(k, attrs[k]);

    return n;
  }
  const pct = (x, dp) => (x * 100).toFixed(dp == null ? 1 : dp) + '%';
  function fmtT(iso, tz) { return new Intl.DateTimeFormat('en-GB', { timeZone: tz, hour: '2-digit', minute: '2-digit' }).format(new Date(iso)); }
  function fmtD(iso, tz) { return new Intl.DateTimeFormat('en-GB', { timeZone: tz, weekday: 'short', day: 'numeric', month: 'short' }).format(new Date(iso)); }
  const todayKWT = () => new Intl.DateTimeFormat('en-CA', { timeZone: KWT }).format(new Date());
  // Card kickoff: the visitor's local time, with Kuwait time in parentheses for non-Kuwait visitors.
  function kt(iso) {
    const loc = fmtT(iso, localTZ);
    return localTZ === KWT ? loc + ' Kuwait' : loc + ' (' + fmtT(iso, KWT) + ' KWT)';
  }
  function dayLocal(iso) { return new Intl.DateTimeFormat('en-CA', { timeZone: localTZ }).format(new Date(iso)); }
  const todayLocal = () => new Intl.DateTimeFormat('en-CA', { timeZone: localTZ }).format(new Date());
  // Whole-site kickoff: visitor-local day and time, with Kuwait time appended (in parentheses for non-Kuwait visitors).
  function kickoff(m) {

  }
  function odds(m) {
    const ra = RT.ratings[m.team1] + E.hostEdge(m.team1, m.venueId, VC);
    const rb = RT.ratings[m.team2] + E.hostEdge(m.team2, m.venueId, VC);
    return E.predict(ra, rb);
  }
  function effScore(m) {
    const ov = activeOv()[m.id];
    if (ov) return { team1: ov[0], team2: ov[1], local: true };
    return m.status === 'completed' && m.score ? m.score : null;
  }
  function flagName(c, bold) {
    const t = T[c];
    return el('span', { class: 'teamcell' }, el('span', { class: 'fl' }, t.flag), el('span', { class: 'nm', title: t.name }, t.name));
  }

  function pbarRow(p) {
    return el('div', null,
      el('div', { class: 'pbar' },
        el('div', { class: 'p1', style: 'width:' + p.p1 * 100 + '%' }),
        el('div', { class: 'pd', style: 'width:' + p.draw * 100 + '%' }),
        el('div', { class: 'p2', style: 'width:' + p.p2 * 100 + '%' })),
      el('div', { class: 'plabels' }, el('span', null, pct(p.p1)), el('span', null, 'draw ' + pct(p.draw)), el('span', null, pct(p.p2))));
  }

  function matchCard(m, opts) {
    const sc = effScore(m);
    const live = !sc && liveNow[m.id];
    const p = odds(m);
    const tag = sc ? el('span', { class: 'tag ' + (sc.local ? 'whatif' : 'ft') }, sc.local ? (whatIf.on ? 'what-if' : 'local') : 'FT')
                   : live ? el('span', { class: 'tag live' }, 'LIVE ' + (live.clock || ''))
                   : el('span', { class: 'tag up' }, 'upcoming');

    const c1 = T[m.team1].code, c2 = T[m.team2].code;
    const xgFav = x1 > x2 + 0.3 ? c1 : x2 > x1 + 0.3 ? c2 : null;
    const winner = g1 > g2 ? c1 : g2 > g1 ? c2 : null;
    if (winner && xgFav && winner !== xgFav)
      return 'The chances favoured ' + xgFav + ' (' + Math.max(x1, x2).toFixed(2) + ' xG); the scoreline flattered ' + winner + '.';
    if ((g1 - x1) >= 1.5 || (g2 - x2) >= 1.5) {
      const c = (g1 - x1) >= (g2 - x2) ? c1 : c2;
      const gg = c === c1 ? g1 : g2, xx = c === c1 ? x1 : x2;

  function renderBracket(root) {
    // most-likely single path
    const VC = Object.fromEntries(D.venues.map(v => [v.id, v.country]));
    const koRoundVenue = {};
    (D.koSchedule || []).forEach(k => { if (k.round && !koRoundVenue[k.round]) koRoundVenue[k.round] = k.venueId; });
    const rank = {};
    GROUPS.forEach(g => {
      rank[g] = D.teams.filter(t => t.group === g).map(t => t.code)
        .sort((a, b) => SIM.teams[b].groupWin - SIM.teams[a].groupWin || SIM.teams[b].top2 - SIM.teams[a].top2 || SIM.teams[b].xPts - SIM.teams[a].xPts);
    });
    const thirdsPool = GROUPS.map(g => rank[g][2]).sort((a, b) => SIM.teams[b].thirdQual - SIM.teams[a].thirdQual).slice(0, 8);
    const pool = thirdsPool.slice();
    const r32 = D.r32Template.map(slot => {
      const pick = side => {
        if (side.type === 'group') return rank[side.group][side.place - 1];
        const oppSide = slot.a.type === 'group' ? rank[slot.a.group][slot.a.place - 1] : null;
        const og = oppSide ? T[oppSide].group : null;
        let i = pool.findIndex(c => (!side.groups || side.groups.indexOf(T[c].group) !== -1) && T[c].group !== og);
        if (i < 0) i = pool.findIndex(c => T[c].group !== og);
        if (i < 0) i = 0;
        return pool.splice(i, 1)[0];
      };
      const a = pick(slot.a), b = pick(slot.b);
      return { a, b, label: slot.label, venue: slot.venueId, date: slot.date };
    });
    function koP(a, b, venueId) {
      const ra = RT.ratings[a] + E.hostEdge(a, venueId, VC);
      const rb = RT.ratings[b] + E.hostEdge(b, venueId, VC);
      const p = E.predict(ra, rb);
      const tilt = Math.max(0.35, Math.min(0.65, 0.5 + (ra - rb) / 4000));
      return p.p1 + p.draw * tilt;
    }
    const cols = [{ name: 'Round of 32', pairs: r32 }];
    let cur = r32;
    for (const name of ['Round of 16', 'Quarter-finals', 'Semi-finals', 'Final']) {
      const nxt = [];
      for (let i = 0; i < cur.length; i += 2) {
        const w1 = koP(cur[i].a, cur[i].b, cur[i].venue) >= 0.5 ? cur[i].a : cur[i].b;
        const o = cur[i + 1];
        const w2 = o ? (koP(o.a, o.b, o.venue) >= 0.5 ? o.a : o.b) : null;
        if (w2) nxt.push({ a: w1, b: w2, venue: koRoundVenue[name] });
      }
      if (!nxt.length) break;
      cols.push({ name, pairs: nxt });
      cur = nxt;
    }
    const fin = cols[cols.length - 1].pairs[0];
    const champ = koP(fin.a, fin.b, fin.venue) >= 0.5 ? fin.a : fin.b;
    root.append(
      el('p', { class: 'muted', style: 'margin-bottom:12px' },
        'One most-likely path through the tournament, taking the modal qualifier in every slot and the favourite in every tie. Real distributions are wider; see the Teams tab for every side’s full funnel.'),
      el('div', { class: 'bracket' },
        cols.map(c => el('div', { class: 'round' }, el('h4', null, c.name),
          c.pairs.map(p => {
            const pa = koP(p.a, p.b, p.venue);
            return el('div', { class: 'bk' },
              p.label ? el('div', { class: 'lbl' }, p.label + (p.date ? ' · ' + p.date : '')) : null,
              el('div', { class: 't ' + (pa >= .5 ? 'w' : '') }, T[p.a].flag, ' ', T[p.a].name, el('span', { class: 'pct' }, pct(pa, 0))),
              el('div', { class: 't ' + (pa < .5 ? 'w' : '') }, T[p.b].flag, ' ', T[p.b].name, el('span', { class: 'pct' }, pct(1 - pa, 0))));
          }))),
        el('div', { class: 'round' }, el('h4', null, 'Champion'),
          el('div', { class: 'bk', style: 'border-color:var(--blue)' },
            el('div', { class: 't w', style: 'font-size:15px' }, T[champ].flag, ' ', T[champ].name),
            el('div', { class: 'lbl' }, 'Model title probability ' + pct(SIM.teams[champ].champ))))));
  }

  function renderVenues(root) {
    const P = WC_MAP.proj;
    const px = lon => (lon - P.lon0) * P.k * P.scale;
    const py = lat => (P.lat0 - lat) * P.scale;
    const xs = D.venues.map(v => px(v.lon)), ys = D.venues.map(v => py(v.lat));
    const M = 58;
    const x0 = Math.min(...xs) - M, y0 = Math.min(...ys) - M;
    const w = Math.max(...xs) - x0 + 2 * M, h = Math.max(...ys) - y0 + 2 * M;
    const shortCity = v => {
      const seg = v.city.split('/').map(s => s.trim());
      const name = (seg.length > 1 ? seg[1] : seg[0]).replace(' Bay Area', '').replace(' New Jersey', '');
      return name;
    };
    const today = todayLocal();
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'geomap');
    svg.setAttribute('viewBox', [x0, y0, w, h].join(' '));
    svg.style.aspectRatio = (w / h).toFixed(3);
    svg.innerHTML = WC_MAP.paths.map(d => '<path class="land" d="' + d + '"/>').join('');
    D.venues.forEach(v => {
      const n = D.matches.filter(m => m.venueId === v.id).length;

      c.setAttribute('class', 'venue'); c.setAttribute('cx', cx); c.setAttribute('cy', cy);

      const tip = document.createElementNS('http://www.w3.org/2000/svg', 'title');
      tip.textContent = v.name + ' — ' + v.city + ' (' + n + ' matches)';

              el('td', { class: 'num' }, el('b', null, pct(s.champ))),
              el('td', { class: 'num' }, T[c].preProb ? T[c].preProb.toFixed(1) + '%' : '—'),
              el('td', { class: 'num' }, T[c].marketProb ? T[c].marketProb.toFixed(1) + '%' : '—')))),
        el('p', { class: 'tiny', style: 'margin-top:8px' },
          'A pure rating simulation spreads probability more evenly than markets do; the gap is the model’s scepticism about favourites, not an error. Both columns are kept so you can judge.')));

    // update console
    const sel = el('select', null, D.matches.filter(m => m.status !== 'completed')
      .sort((a, b) => a.dateET.localeCompare(b.dateET))
      .map(m => el('option', { value: m.id }, m.id + ' · ' + T[m.team1].code + ' v ' + T[m.team2].code + ' · ' + fmtD(m.dateET, localTZ))));
    const a = el('input', { type: 'number', min: 0, max: 9, style: 'width:60px', placeholder: '0' });
    const b = el('input', { type: 'number', min: 0, max: 9, style: 'width:60px', placeholder: '0' });
    const ta = el('textarea', { placeholder: '{"M003": [2, 1], "M004": [0, 0]}' });
    root.append(el('div', { class: 'card no-print', style: 'margin-bottom:14px' },
      el('h3', null, 'Update console', el('span', { class: 'right' }, nLocal + ' local result' + (nLocal === 1 ? '' : 's'))),
      el('div', { class: 'formrow' }, sel, a, el('span', null, '–'), b,
        el('button', {
          class: 'btn small', onclick: () => {
            const g1 = parseInt(a.value, 10), g2 = parseInt(b.value, 10);
            if (isNaN(g1) || isNaN(g2)) return;
            const tgt = whatIf.on ? whatIf.ov : localOv;
            tgt[sel.value] = [g1, g2];
            if (!whatIf.on) lsSet(LS.ov, localOv);
            refresh();
          }
        }, 'Apply result')),
      el('div', { class: 'formrow' }, ta),
      el('div', { class: 'formrow' },
        el('button', {
          class: 'btn small ghost', onclick: () => {
            try {
              const o = JSON.parse(ta.value);
              const tgt = whatIf.on ? whatIf.ov : localOv;
              for (const k in o) if (Array.isArray(o[k]) && o[k].length === 2) tgt[k] = o[k];
              if (!whatIf.on) lsSet(LS.ov, localOv);
              ta.value = ''; refresh();
            } catch (e) { alert('Could not parse that JSON.'); }
          }
        }, 'Apply JSON patch'),
        nLocal ? el('button', { class: 'btn small ghost', onclick: () => { localOv = {}; lsSet(LS.ov, localOv); refresh(); } }, 'Clear local results') : null,
        el('button', {
          class: 'btn small ghost', onclick: () => {
            const blob = new Blob([JSON.stringify({ asOf: new Date().toISOString(), localResults: localOv }, null, 1)], { type: 'application/json' });
            const u = URL.createObjectURL(blob);
            const link = el('a', { href: u, download: 'wc26-local-results.json' }); document.body.append(link); link.click(); link.remove();
          }
        }, 'Export local results'),
        el('button', { class: 'btn small ghost', onclick: () => window.print() }, 'Print this view')),
      el('p', { class: 'tiny' },
        'Results entered here apply on this device immediately (every probability recomputes). The published site is updated by Mohammed: scores are patched into the data, the engine re-runs, a timeline snapshot is recorded, and the new build goes live for everyone.')));

    root.append(el('div', { class: 'card' },
      el('h3', null, 'Data'),
      el('p', { class: 'muted' }, 'Snapshot: ' + D.meta.asOf + ' · ' + D.meta.asOfNote),
      el('div', { class: 'muted', style: 'margin-top:6px' }, 'Sources: ',
        D.meta.sources.map((s, i) => el('span', null, i ? ' · ' : '', el('a', { href: s.url, target: '_blank' }, s.name))))));
  }

  function renderAbout(root) {
    const P = (...kids) => el('p', { class: 'muted', style: 'margin-bottom:9px' }, ...kids);
    root.append(
      el('div', { class: 'card', style: 'margin-bottom:14px' },
        el('h3', null, 'What this site is'),
        P('A live probability centre for the 2026 World Cup. Every number on it comes from one statistical model that re-runs whenever a result comes in, so the percentages you see always reflect the tournament as it actually stands. It is a personal analytics project (the MAS monogram in the corner), not an official FIFA product, and the numbers are estimates for following the tournament, not betting advice.')),

      el('div', { class: 'card', style: 'margin-bottom:14px' },
        el('h3', null, 'The tabs, in one line each'),
        el('table', null, [
          ['Today', 'today’s fixtures in your local time, the latest results, the title race, the MENA strip and the player watch'],
          ['Matches', 'every fixture day by day; click any match for its detailed odds and most likely scorelines'],
          ['Groups', 'all twelve group tables: real standings plus the model’s projected points and qualification chances'],
          ['Bracket', 'one most-likely path from the Round of 32 to the champion; the favourite in every tie'],
          ['Teams', 'all 48 teams, sortable; click a team for its "glory funnel" from group stage to trophy'],
          ['MENA', 'the nine Middle East and North Africa sides, tracked together'],
          ['League', 'the family predictions game: make picks, send the code, follow the leaderboard'],
          ['Timeline', 'how each contender’s title chance has risen and fallen across the tournament'],
          ['Venues', 'the sixteen stadiums across the three host countries'],
          ['Model & Updates', 'the technical description of the model, the model-versus-market table, and the console for entering results'],
        ].map(([k, v]) => el('tr', null, el('td', { style: 'white-space:nowrap' }, el('b', null, k)), el('td', { class: 'muted' }, v))))),

      el('div', { class: 'card', style: 'margin-bottom:14px' },
        el('h3', null, 'The probabilities, explained simply'),
        P(el('b', null, '1. Every team has a strength number. '), 'Like a chess rating: Spain’s is high, New Zealand’s is low. The starting numbers come from the FIFA world rankings. Every match changes them: win and your number goes up, lose and it goes down, and a thrashing moves it more than a narrow squeak. Beating a giant earns far more than beating a minnow. So the ratings quietly learn from the tournament as it happens; South Korea’s rating already rose for their comeback win.'),
        P(el('b', null, '2. The gap between two strength numbers sets the odds of one match. '), 'When two teams meet, the model compares their numbers. A big gap means the stronger side wins most of the time; a small gap means it is close to a coin flip, with a healthy chance of a draw. The gap also says how many goals each side should expect to score, on average.'),
        P(el('b', null, '3. Goals are dice rolls. '), 'Football is low-scoring and luck matters. So instead of declaring "this will finish 2-1", the model treats goals like rolls of a loaded dice: a team expected to score 1.8 goals sometimes scores 0, usually 1 or 2, occasionally 4. (The mathematical name for this is a Poisson distribution; the dice picture is honestly all you need.)'),
        P(el('b', null, '4. Then we play the whole World Cup 10,000 times. '), 'This is the heart of it, and it is called a Monte Carlo simulation, named after the casino. Nobody can calculate the future of a 104-match tournament directly; there are too many combinations. So the computer simply plays it out: every remaining match decided by those dice rolls, group tables computed, the bracket drawn, extra time and penalty shootouts included, all the way to a champion being crowned. Then it does that again. And again, ten thousand times. Spain lifting the trophy in roughly 700 of those 10,000 imaginary tournaments is exactly what "Spain 7%" means on the Today tab. No mystery: the percentage is just counting.'),
        P(el('b', null, '5. The small print, honestly. '), 'Host nations get a modest ratings boost when playing at home, because history says it is real. The "±" you see next to title chances is the give-or-take from running 10,000 experiments rather than infinity. And the model only knows results: it cannot see injuries, suspensions, team sheets or dressing-room moods, which is one reason its numbers differ a little from the bookmakers’ (the Model tab shows both side by side, so you can judge).')),

      el('div', { class: 'card' },
        el('h3', null, 'Where the data comes from'),
        P('Fixtures, rankings and venues were loaded from FIFA’s published schedule. Results flow in automatically three ways: while a match is being played, the page itself checks the public scores feed every few minutes and shows a red LIVE tag with the score; when a match finishes, the final score is applied and every probability recomputes on the spot; and a small robot republishes the site for everyone every couple of hours during the match window. The “↻ Scores” button forces an immediate check any time you ask. Built and maintained by Mohammed Al-Sabah’s analytics setup, June 2026.')));
  }

  // ---------- live overlay: the page keeps itself current during match windows ----------
  let liveNow = {};   // matchId -> {g1, g2, clock} display-only; finals flow through localOv
  let liveGoals = {}; // matchId -> [goal,...] from the ESPN summary, fetched only for in-play matches
  const etDate = m => m.dateET.slice(0, 10).replace(/-/g, '');   // dateET already carries the Eastern offset

  // Parse ESPN summary keyEvents into our compact goal shape (mirrors fetch_goals.py).
  function parseEspnGoals(summary, ids) {
    const out = [];
    for (const k of ((summary && summary.keyEvents) || [])) {
      if (!k.scoringPlay) continue;
      const ttext = (k.type && k.type.text) || '';
      const code = ids[String((k.team && k.team.id) || '')];
      const scorer = k.participants && k.participants[0] && k.participants[0].athlete && k.participants[0].athlete.displayName;
      if (!code || !scorer) continue;
      const g = { t: code, p: scorer, m: (k.clock && k.clock.displayValue) || '' };
      if (ttext.indexOf('Penalty') !== -1) g.pen = true;
      if (ttext.indexOf('Own') !== -1) g.og = true;
      out.push(g);
    }
    return out;
  }

  async function pollLive() {
    // only bother when a fixture is near: kickoff within the last 4h or the next hour
    const now = Date.now();
    const near = D.matches.filter(m => {
      if (effScore(m)) return false;
      const ko = new Date(m.dateET).getTime();
      return now >= ko - 3600e3 && now <= ko + 4 * 3600e3;
    });
    if (!near.length) { if (Object.keys(liveNow).length) { liveNow = {}; renderHeader(); renderTab(); } return; }
    try {
      const days = [...new Set(near.map(etDate))].sort();
      const rng = days.length === 1 ? days[0] : days[0] + '-' + days[days.length - 1];
      const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=' + rng);
      const js = await r.json();
      const ids = (typeof WC_ESPNMAP !== 'undefined' && WC_ESPNMAP.teamIds) || {};
      const fresh = {};
      const inPlay = [];
      let finals = 0;
      for (const e of (js.events || [])) {
        const st = e.status && e.status.type;
        if (!st) continue;
        const sc = {};
        for (const c of e.competitions[0].competitors) {
          const code = ids[String(c.team.id)] || c.team.abbreviation;
          sc[code] = parseInt(c.score, 10);
        }
        const match = near.find(m => sc[m.team1] != null && sc[m.team2] != null);
        if (!match) continue;
        if (st.state === 'in') {
          fresh[match.id] = { g1: sc[match.team1], g2: sc[match.team2], clock: st.shortDetail || '' };
          inPlay.push([match.id, e.id]);
        } else if (st.name === 'STATUS_FULL_TIME' && st.completed && !localOv[match.id]) {
          const g1 = sc[match.team1], g2 = sc[match.team2];
          if (g1 >= 0 && g1 <= 15 && g2 >= 0 && g2 <= 15) { localOv[match.id] = [g1, g2]; finals++; }
        }
      }
      // live goals: hit the ESPN summary only for the in-play match(es), this poll only —
      // so the scorer feed runs during a match and is silent the rest of the time.
      let goalsChanged = false;
      for (const [mid, eid] of inPlay) {
        try {
          const sr = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=' + eid);
          const g = parseEspnGoals(await sr.json(), ids);
          if (JSON.stringify(g) !== JSON.stringify(liveGoals[mid])) { liveGoals[mid] = g; goalsChanged = true; }
        } catch (e) { /* best-effort */ }
      }
      const changedLive = JSON.stringify(fresh) !== JSON.stringify(liveNow);
      liveNow = fresh;
      if (finals) { lsSet(LS.ov, localOv); refresh(); toast(finals + ' final score' + (finals === 1 ? '' : 's') + ' came in; probabilities recomputed.'); }
      else if (changedLive || goalsChanged) { renderHeader(); renderTab(); }
    } catch (err) { /* silent: the live overlay is best-effort */ }
  }
  setInterval(pollLive, 180000);

  // ---------- live score refresh (ESPN public feed, CORS-open) ----------
  let toastTimer = null;
  function toast(msg) {
    document.querySelectorAll('.toast').forEach(n => n.remove());
    const t = el('div', { class: 'toast' }, msg);
    document.body.append(t);
    requestAnimationFrame(() => t.classList.add('show'));
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 4200);
  }

  async function refreshScores() {
    const btn = document.getElementById('refresh');
    btn.disabled = true; btn.textContent = 'Checking…';
    try {
      const now = new Date();
      const pending = D.matches.filter(m => m.status !== 'completed' && !localOv[m.id] &&
        new Date(m.dateET) <= now && (now - new Date(m.dateET)) < 96 * 3600e3);
      if (!pending.length) { toast('No matches awaiting results right now.'); return; }
      const days = [...new Set(pending.map(etDate))].sort();
      const rng = days.length === 1 ? days[0] : days[0] + '-' + days[days.length - 1];
      const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=' + rng);
      const js = await r.json();
      const ids = (typeof WC_ESPNMAP !== 'undefined' && WC_ESPNMAP.teamIds) || {};
      let n = 0;
      for (const e of (js.events || [])) {
        const st = e.status && e.status.type;
        if (!st || st.name !== 'STATUS_FULL_TIME' || !st.completed) continue;
        const sc = {};
        for (const c of e.competitions[0].competitors) {
          const code = ids[String(c.team.id)] || c.team.abbreviation;
          sc[code] = parseInt(c.score, 10);
        }
        const match = pending.find(m => sc[m.team1] != null && sc[m.team2] != null);
        if (!match) continue;
        const g1 = sc[match.team1], g2 = sc[match.team2];
        if (!(g1 >= 0 && g1 <= 15 && g2 >= 0 && g2 <= 15)) continue;
        localOv[match.id] = [g1, g2]; n++;
      }
      if (n) { lsSet(LS.ov, localOv); refresh(); }
      toast(n ? n + ' new result' + (n === 1 ? '' : 's') + ' pulled; all probabilities recomputed.'
              : 'Feed reached; no new final scores yet.');
    } catch (err) {
      toast('Could not reach the scores feed; try again in a minute.');
    } finally {
      btn.disabled = false; btn.textContent = '↻ Scores';
    }
  }

  // ---------- shell ----------
  function refresh() {
    recompute();
    renderHeader();
    renderTab();
  }
  function renderHeader() {
    const asof = document.getElementById('asof');
    const nLocal = Object.keys(localOv).length;
    const nLive = Object.keys(liveNow).length;
    asof.innerHTML = 'Data as of ' + D.meta.asOf +
      (nLocal && !whatIf.on ? '<br>+' + nLocal + ' local result' + (nLocal === 1 ? '' : 's') : '') +
      (nLive ? '<br><b>● LIVE: ' + nLive + ' match' + (nLive === 1 ? '' : 'es') + '</b>' : '<br>10,000-run Monte Carlo');
    const wbtn = document.getElementById('whatif');
    wbtn.textContent = whatIf.on ? 'What-if mode ON — exit' : 'What-if';
    wbtn.className = 'whatif-pill' + (whatIf.on ? '' : ' off');
    const ban = document.getElementById('banner');
    if (whatIf.on) {
      const n = Object.keys(whatIf.ov).length;
      ban.style.display = 'flex';
      ban.replaceChildren(
        el('span', null, '⚠︎ What-if mode: ' + n + ' hypothetical result' + (n === 1 ? '' : 's') + ' applied. Nothing is saved; exit to snap back to reality.'),
        el('button', { class: 'btn small ghost', onclick: () => { whatIf.ov = {}; refresh(); } }, 'Reset what-ifs'));
    } else ban.style.display = 'none';
  }
  function renderTab() {
    const root = document.getElementById('view');
    root.innerHTML = '';
    document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
    ({
      today: renderToday, matches: renderMatches, groups: renderGroups, bracket: renderBracket,
      teams: renderTeams, mena: renderMena, join: renderJoin, league: renderLeague, compare: renderCompare, timeline: renderTimeline,
      venues: renderVenues, model: renderModel, about: renderAbout, geeks: renderGeeks,
    })[activeTab](root);
    window.scrollTo(0, 0);
  }

  function init() {
    const nav = document.getElementById('nav');
    tabs.forEach(([id, label]) => nav.append(el('button', {
      'data-tab': id, onclick: () => { activeTab = id; lsSet(LS.tab, id); history.replaceState(null, '', '#' + id); renderTab(); }
    }, label)));
    // shareable tab links: #league opens the league directly
    const fromHash = (location.hash || '').slice(1);
    if (tabs.some(([id]) => id === fromHash)) activeTab = fromHash;
    if (!tabs.some(([id]) => id === activeTab)) activeTab = 'today';  // guard a stale/removed tab id stored from an earlier version
    window.addEventListener('hashchange', () => {
      const h = (location.hash || '').slice(1);
      if (tabs.some(([id]) => id === h) && h !== activeTab) { activeTab = h; renderTab(); }
    });
    setTimeout(pollLive, 2500);
    document.getElementById('refresh').addEventListener('click', refreshScores);
    document.getElementById('whatif').addEventListener('click', () => {
      whatIf.on = !whatIf.on;
      if (!whatIf.on) whatIf.ov = {};
      refresh();
    });
    (function () {   // theme: Auto (follows the system) / Dark / Light override; persisted
      const labels = { auto: '◐ Auto', dark: '☾ Dark', light: '☀ Light' }, order = ['auto', 'dark', 'light'];
      const tbtn = document.getElementById('theme');
      const mq = window.matchMedia ? matchMedia('(prefers-color-scheme: dark)') : null;
      const apply = mode => {
        const eff = (mode === 'dark' || (mode === 'auto' && mq && mq.matches)) ? 'dark' : 'light';
        document.documentElement.dataset.theme = eff;
        if (tbtn) tbtn.textContent = labels[mode];
      };
      let mode = lsGet(LS.theme, 'auto');
      if (order.indexOf(mode) === -1) mode = 'auto';
      apply(mode);
      if (tbtn) tbtn.addEventListener('click', () => {
        mode = order[(order.indexOf(mode) + 1) % order.length];
        lsSet(LS.theme, mode); apply(mode);
      });
      if (mq && mq.addEventListener) mq.addEventListener('change', () => { if (mode === 'auto') apply('auto'); });
    })();
    document.getElementById('view').append(el('div', { class: 'spin' }, 'Running 10,000 tournament simulations…'));
    setTimeout(refresh, 30);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();

</script>
<script>
// Register the service worker for seamless background updates. Network-first
// (see sw.js) keeps the app fresh whenever online; this also auto-reloads once
// when a new worker takes over, and re-checks for updates whenever the app is
// brought back to the foreground (the case that matters for iOS home-screen apps).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js').then(function (reg) {
      var updatePending = false, refreshing = false;
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) updatePending = true;
        });
      });
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (updatePending && !refreshing) { refreshing = true; location.reload(); }
      });
      // re-check on foreground (reopened standalone app) and shortly after load
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') reg.update().catch(function () {});
      });
      setTimeout(function () { reg.update().catch(function () {}); }, 3000);
    }).catch(function () {});
  });
}
</script>
</body>
